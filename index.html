<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador de Leads por Campanha - Ranking</title>
  <style>
    :root {
      --bg-main: #fff7ed;
      --bg-secondary: #eef4ff;
      --card: #ffffff;
      --card-2: #fffaf4;
      --text: #172033;
      --muted: #64748b;
      --line: #e5e7eb;

      --orange: #f97316;
      --orange-strong: #ea580c;
      --orange-soft: #ffedd5;
      --orange-text: #9a3412;

      --blue: #2563eb;
      --blue-dark: #0f1f3a;
      --blue-soft: #eff6ff;
      --blue-text: #1d4ed8;

      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --radius: 20px;
      --shadow: 0 16px 42px rgba(15, 23, 42, 0.08);
      --card-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    }

    body.dark-mode {
      --bg-main: #071527;
      --bg-secondary: #0f1f3a;
      --card: #0f1f3a;
      --card-2: #132844;
      --text: #ffffff;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.16);

      --orange: #f97316;
      --orange-strong: #fb923c;
      --orange-soft: rgba(249, 115, 22, 0.16);
      --orange-text: #fed7aa;

      --blue: #ffffff;
      --blue-dark: #071527;
      --blue-soft: rgba(255, 255, 255, 0.12);
      --blue-text: #ffffff;

      --success: #fb923c;
      --danger: #ffffff;
      --warning: #f97316;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
      --card-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg-secondary);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .app {
      width: min(1860px, calc(100% - 20px));
      height: 100vh;
      margin: 0 auto;
      padding: 12px 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 46px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 15px;
      background: var(--blue-dark);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.1;
      letter-spacing: -0.04em;
      white-space: nowrap;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 760px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 9px 12px;
      font-weight: 850;
      cursor: pointer;
      transition: 0.18s ease;
      font-size: 12px;
      white-space: nowrap;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-soft {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-soft:hover {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue-text);
    }

    .btn-danger {
      background: var(--orange);
      color: #ffffff;
    }

    .btn-danger:hover {
      background: var(--orange-strong);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      min-height: 64px;
    }

    .metric {
      padding: 10px 13px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      min-width: 0;
      border-top: 3px solid var(--orange);
    }

    .metric:nth-child(2) {
      border-top-color: var(--blue);
    }

    .metric span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 750;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
      letter-spacing: -0.06em;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }

    .left-panel,
    .right-panel {
      min-height: 0;
      overflow: hidden;
    }

    .right-panel {
      display: grid;
      grid-template-rows: 1fr;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: background 0.25s ease, border-color 0.25s ease;
      min-height: 0;
    }

    .left-panel .card,
    .right-panel .card {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .card-header {
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 56px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 950;
      letter-spacing: -0.02em;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .card-body {
      padding: 10px 12px 12px;
      min-height: 0;
      overflow: hidden;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--orange-soft);
      color: var(--orange-text);
      font-size: 12px;
      font-weight: 900;
      width: fit-content;
      white-space: nowrap;
    }

    .pill-blue {
      background: var(--blue-soft);
      color: var(--blue-text);
    }

    .pill-success {
      background: var(--orange-soft);
      color: var(--orange-text);
    }

    .pill-danger {
      background: var(--blue-soft);
      color: var(--blue-text);
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .campaign-grid {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 1fr;
      gap: 9px;
      overflow: hidden;
    }

    .campaign-card {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card-2);
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      transition: 0.18s ease;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .campaign-card:hover {
      transform: translateY(-2px);
      border-color: var(--orange);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .campaign-message {
      font-size: 12.4px;
      line-height: 1.25;
      font-weight: 780;
      letter-spacing: -0.02em;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .campaign-footer {
      border-top: 1px solid var(--line);
      padding-top: 7px;
      display: grid;
      gap: 7px;
    }

    .campaign-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .count-box {
      display: flex;
      align-items: baseline;
      gap: 7px;
    }

    .count {
      font-size: 23px;
      font-weight: 950;
      letter-spacing: -0.08em;
    }

    .count-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 0.82fr;
      gap: 7px;
    }

    .btn-add {
      background: var(--orange);
      color: #ffffff;
    }

    .btn-add:hover {
      background: var(--orange-strong);
    }

    .btn-undo {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-undo:hover {
      background: var(--blue-soft);
      color: var(--blue-text);
      border-color: var(--blue);
    }

    .ranking-list {
      height: 100%;
      overflow: auto;
      display: grid;
      gap: 9px;
      padding-right: 4px;
    }

    .ranking-list::-webkit-scrollbar {
      width: 8px;
    }

    .ranking-list::-webkit-scrollbar-track {
      background: rgba(100, 116, 139, .14);
      border-radius: 999px;
    }

    .ranking-list::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--orange), var(--blue));
      border-radius: 999px;
    }

    .ranking-item {
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--card-2);
      border-radius: 15px;
      display: grid;
      gap: 8px;
    }

    .ranking-top {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .rank-position {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--orange);
      color: #fff;
      font-weight: 950;
      font-size: 12px;
    }

    body.dark-mode .rank-position {
      background: var(--orange);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
    }

    .ranking-message {
      font-size: 12px;
      line-height: 1.3;
      font-weight: 800;
      color: var(--text);
    }

    .ranking-count {
      font-size: 20px;
      font-weight: 950;
      color: var(--orange);
      letter-spacing: -0.06em;
    }

    .bar-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(100, 116, 139, .18);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--orange);
      transition: width .25s ease;
    }

    body.dark-mode .bar-fill {
      background: var(--orange);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warning);
      display: inline-block;
      margin-right: 7px;
    }

    .status-dot.ok { background: var(--success); }
    .status-dot.error { background: var(--danger); }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      padding: 11px 13px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: .2s ease;
      max-width: 420px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1500px) {
      .main-layout { grid-template-columns: minmax(0, 1fr) 390px; }
      .campaign-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 1050px) {
      html, body { overflow: auto; height: auto; }
      .app {
        height: auto;
        overflow: visible;
        display: block;
      }

      .summary,
      .main-layout {
        display: grid;
        grid-template-columns: 1fr;
        margin-bottom: 10px;
      }

      .left-panel .card,
      .right-panel .card {
        height: auto;
      }

      .campaign-grid {
        height: auto;
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        overflow: visible;
      }

      .campaign-card {
        min-height: 125px;
      }

      .ranking-list {
        max-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">CW</div>
        <div>
          <h1>Contador de Leads por Campanha</h1>
          <div class="subtitle">Cards para clicar à esquerda. Ranking em tempo real à direita.</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-soft" onclick="alternarTema()" id="themeButton">Modo escuro</button>
        <button class="btn-soft" onclick="copiarResumo()">Copiar resumo</button>
        <button class="btn-soft" onclick="exportarCSV()">Exportar CSV</button>
        <button class="btn-danger" onclick="zerarDados()">Zerar contador</button>
      </div>
    </header>

    <section class="summary" id="summary"></section>

    <section class="main-layout">
      <div class="left-panel">
        <section class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Clique na campanha</div>
              <div class="card-subtitle">Clique em +1 para somar. Use desfazer para tirar um clique da campanha específica.</div>
            </div>
            <span class="pill" id="connectionStatus"><span class="status-dot"></span>Conectando</span>
          </div>
          <div class="card-body">
            <div class="campaign-grid" id="campaignGrid"></div>
          </div>
        </section>
      </div>

      <aside class="right-panel">
        <section class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Ranking das campanhas</div>
              <div class="card-subtitle">Da campanha mais clicada para a menos clicada.</div>
            </div>
            <span class="pill pill-blue">Tempo real</span>
          </div>
          <div class="card-body">
            <div class="ranking-list" id="rankingList"></div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      runTransaction,
      set
    } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC_mm8qSnA2JuPjDgLyALNBPucsosgHgIM",
      authDomain: "leitor-campanhas-caue.firebaseapp.com",
      databaseURL: "https://leitor-campanhas-caue-default-rtdb.firebaseio.com",
      projectId: "leitor-campanhas-caue",
      storageBucket: "leitor-campanhas-caue.firebasestorage.app",
      messagingSenderId: "75509774581",
      appId: "1:75509774581:web:3d1369d9ab90f6d9a3adbc"
    };

    const SENHA_GESTOR = "1234";

    const campanhas = [
      { id: 'dia-maes-1', nome: 'CAMPANHA DIA DAS MÃES - Anúncio 1', mensagem: 'Olá, quero garantir minha 2ª Graduação e presentear minha mãe.' },
      { id: 'dia-maes-2', nome: 'CAMPANHA DIA DAS MÃES - Anúncio 2', mensagem: 'Olá, quero fazer minha 2ª Graduação e presentear minha mãe.' },
      { id: 'orcamento-12m', nome: '[CAMPANHA TESTE ORÇAMENTO REDUZIDO] - AUDIENCE NETWORK - Anúncio 1 - Imagem 1', mensagem: 'Olá, quero mais informações do curso de 2ª Graduação em 12 meses!' },
      { id: 'orcamento-geral', nome: '[CAMPANHA TESTE ORÇAMENTO REDUZIDO] - AUDIENCE NETWORK - Anúncio 2 - Imagem 2', mensagem: 'Olá, quero mais informações do curso de 2ª Graduação..' },
      { id: 'segmentacao-video', nome: '[TESTE DE SEGMENTAÇÃO] 13/04 - Anúncio 1 video', mensagem: 'Olá, quero informações sobre os cursos de 2ª Graduação online.' },
      { id: 'segmentacao-pedagogia', nome: '[TESTE DE SEGMENTAÇÃO] 13/04 - Anúncio 2 pedagogia', mensagem: 'Olá, quero informações sobre o curso de pedagogia.' },
      { id: 'principal-cursos', nome: '[VENDAS] - [CAMPANHA PRINCIPAL] 30/12 - Anúncio 1 - Imagem 1', mensagem: 'Olá, quero conhecer os cursos online de 2ª Graduação' },
      { id: 'principal-interesse', nome: '[VENDAS] - [CAMPANHA PRINCIPAL] 30/12 - Anúncio 2 - imagem 2', mensagem: 'Olá, tenho interesse nos cursos de 2ª Graduação online.' },
      { id: 'principal-pedagogia', nome: '[VENDAS] - [CAMPANHA PRINCIPAL] 30/12 - Anúncio 3 - imagem 3', mensagem: 'Olá, gostaria de saber mais sobre o curso de Pedagogia' },
      { id: 'tecnico-tecnologo', nome: '[TÉCNICO PARA TECNÓLOGO] - 07/05', mensagem: 'Olá, quero informações sobre os cursos de tecnólogo.' }
    ];

    let db = null;
    let contagemAtual = {};
    let toastTimer = null;

    const baseContagem = {};
    campanhas.forEach(c => baseContagem[c.id] = 0);

    function aplicarTemaSalvo() {
      const tema = localStorage.getItem("temaPainelCampanhas") || "claro";
      const escuro = tema === "escuro";
      document.body.classList.toggle("dark-mode", escuro);
      document.getElementById("themeButton").textContent = escuro ? "Modo claro" : "Modo escuro";
    }

    window.alternarTema = function() {
      const escuroAgora = document.body.classList.toggle("dark-mode");
      localStorage.setItem("temaPainelCampanhas", escuroAgora ? "escuro" : "claro");
      document.getElementById("themeButton").textContent = escuroAgora ? "Modo claro" : "Modo escuro";
    };

    aplicarTemaSalvo();

    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      iniciarFirebase();
      atualizarStatus("Conectado", "ok");
    } catch (error) {
      console.error(error);
      atualizarStatus("Erro Firebase", "error");
      mostrarToast("Erro na configuração do Firebase.");
    }

    function atualizarStatus(texto, tipo) {
      const el = document.getElementById("connectionStatus");
      const classe = tipo === "ok" ? "ok" : tipo === "error" ? "error" : "";
      el.innerHTML = `<span class="status-dot ${classe}"></span>${texto}`;
    }

    function iniciarFirebase() {
      const contadoresRef = ref(db, "painelCampanhas/contadores");

      onValue(contadoresRef, (snapshot) => {
        contagemAtual = { ...baseContagem, ...(snapshot.val() || {}) };
        renderizarTudo();
        atualizarStatus("Tempo real ativo", "ok");
      }, (error) => {
        console.error(error);
        atualizarStatus("Erro ao ler", "error");
      });
    }

    window.registrarLead = async function(id) {
      if (!db) {
        alert("Firebase ainda não configurado.");
        return;
      }

      const campanha = campanhas.find(c => c.id === id);
      if (!campanha) return;

      try {
        const contadorRef = ref(db, `painelCampanhas/contadores/${id}`);
        await runTransaction(contadorRef, (valorAtual) => (valorAtual || 0) + 1);
        mostrarToast(`+1 registrado: ${campanha.mensagem}`);
      } catch (error) {
        console.error(error);
        alert("Não foi possível registrar o lead. Confira o Firebase e a internet.");
      }
    };

    window.desfazerCampanha = async function(id) {
      if (!db) {
        alert("Firebase ainda não configurado.");
        return;
      }

      const campanha = campanhas.find(c => c.id === id);
      if (!campanha) return;

      const atual = Number(contagemAtual[id] || 0);
      if (atual <= 0) {
        mostrarToast("Essa campanha já está zerada.");
        return;
      }

      try {
        const contadorRef = ref(db, `painelCampanhas/contadores/${id}`);
        await runTransaction(contadorRef, (valorAtual) => {
          const numero = Number(valorAtual || 0);
          return Math.max(0, numero - 1);
        });

        mostrarToast(`-1 desfeito: ${campanha.mensagem}`);
      } catch (error) {
        console.error(error);
        alert("Não foi possível desfazer o clique. Confira o Firebase e a internet.");
      }
    };

    function mostrarToast(texto) {
      const toast = document.getElementById("toast");
      toast.textContent = texto;
      toast.classList.add("show");

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function renderizarResumo() {
      const total = Object.values(contagemAtual).reduce((soma, valor) => soma + Number(valor || 0), 0);
      const ranking = getRanking();
      const maior = ranking[0];

      document.getElementById('summary').innerHTML = `
        <div class="metric"><span>Total de leads marcados</span><strong>${total}</strong></div>
        <div class="metric"><span>Campanhas cadastradas</span><strong>${campanhas.length}</strong></div>
        <div class="metric"><span>Campanha líder</span><strong style="font-size:18px;letter-spacing:-0.04em;line-height:1.15;">${maior && maior.total ? maior.mensagem : 'Nenhuma ainda'}</strong></div>
      `;
    }

    function renderizarCampanhas() {
      const grid = document.getElementById('campaignGrid');

      grid.innerHTML = campanhas.map(campanha => `
        <div class="campaign-card">
          <div class="campaign-message">${campanha.mensagem}</div>
          <div class="campaign-footer">
            <div class="campaign-stats">
              <div class="count-box">
                <span class="count">${contagemAtual[campanha.id] || 0}</span>
                <span class="count-label">leads</span>
              </div>
              <span class="pill">campanha</span>
            </div>
            <div class="card-actions">
              <button class="btn-add" onclick="registrarLead('${campanha.id}')">+1 clique</button>
              <button class="btn-undo" onclick="desfazerCampanha('${campanha.id}')">Desfazer</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function getRanking() {
      return campanhas
        .map(c => ({ ...c, total: Number(contagemAtual[c.id] || 0) }))
        .sort((a, b) => b.total - a.total || a.mensagem.localeCompare(b.mensagem));
    }

    function renderizarRanking() {
      const ranking = getRanking();
      const maior = Math.max(...ranking.map(item => item.total), 1);
      const box = document.getElementById('rankingList');

      box.innerHTML = ranking.map((item, index) => {
        const percentual = Math.round((item.total / maior) * 100);
        return `
          <div class="ranking-item">
            <div class="ranking-top">
              <div class="rank-position">${index + 1}</div>
              <div class="ranking-message">${item.mensagem}</div>
              <div class="ranking-count">${item.total}</div>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${percentual}%;"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderizarTudo() {
      renderizarResumo();
      renderizarCampanhas();
      renderizarRanking();
    }

    window.zerarDados = async function() {
      if (!db) {
        alert("Firebase ainda não configurado.");
        return;
      }

      const senha = prompt("Digite a senha do Gestor para zerar os números:");
      if (senha === null) return;

      if (senha !== SENHA_GESTOR) {
        alert("Senha incorreta. A contagem não foi zerada.");
        return;
      }

      const confirmar = confirm("Tem certeza que deseja zerar todos os números?");
      if (!confirmar) return;

      try {
        await set(ref(db, "painelCampanhas/contadores"), baseContagem);
        await set(ref(db, "painelCampanhas/historico"), null);
        mostrarToast("Contador zerado com senha de gestor.");
      } catch (error) {
        console.error(error);
        alert("Não foi possível zerar. Confira as regras do Firebase.");
      }
    };

    window.copiarResumo = function() {
      const linhas = getRanking().map(c => `${c.mensagem}: ${c.total} leads`);
      navigator.clipboard.writeText(linhas.join('\n'));
      alert('Resumo copiado.');
    };

    window.exportarCSV = function() {
      const linhas = [['Posicao', 'Mensagem', 'Leads']];

      getRanking().forEach((c, index) => {
        linhas.push([index + 1, c.mensagem, c.total]);
      });

      const csv = linhas
        .map(linha => linha.map(campo => `"${String(campo).replace(/"/g, '""')}"`).join(';'))
        .join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ranking-leads-campanhas-tempo-real.csv';
      a.click();
      URL.revokeObjectURL(url);
    };

    contagemAtual = { ...baseContagem };
    renderizarTudo();
  </script>
</body>
</html>
